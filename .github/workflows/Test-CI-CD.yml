name: Salesforce CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  push:
    branches: [main]

jobs:
  salesforce-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Install Salesforce CLI'
        run: npm install @salesforce/cli --global

      - name: 'Authenticate to Dev Org'
        run: |
          echo "${{ secrets.AUTH_URL }}" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default --alias Devorg
          rm sfdx_auth.txt

      # 2. VALIDATE: Triggered when a PR is created/updated
      # this didnt work because of the codee coverage required to be atleast 75% to deploy to production and i don't know how to solve it for now
      - name: 'Validate PR with Test List'
        run: |
          # Convert file lines into a comma-separated string
          TEST_LIST=$(awk '{printf "--tests %s ", $1}' manifest/TestClass.txt)
          
          sf project deploy validate --manifest manifest/package.xml \
            --target-org Devorg \
            --test-level RunSpecifiedTests \
            --tests "$TEST_LIST"
      # --wait 30

      # 3. DEPLOY: Triggered when PR is merged into main
      - name: 'Deploy to Org'
        if: github.event_name == 'push'
        run: |
          sf project deploy start --manifest manifest/package.xml \
            --target-org Devorg \
            --test-level NoTestRun \
            --wait 30
